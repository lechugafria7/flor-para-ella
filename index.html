<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Una flor para ti</title>

<style>
body{
    margin:0;
    height:100vh;
    background:linear-gradient(#0f172a,#020617);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
    color:white;
    overflow:hidden;
}

/* Talllo */
.stem{
    width:8px;
    height:0;
    background:#16a34a;
    animation:growStem 2s forwards;
}

/* Flor principal */
.flower{
    position:relative;
    width:120px;
    height:120px;
    margin-bottom:-10px;
}

.petal{
    width:60px;
    height:60px;
    background:#ff4da6;
    border-radius:50%;
    position:absolute;
    transform:scale(0);
    animation:bloom 1s forwards;
}

.petal:nth-child(1){
    top:0;
    left:30px;
    animation-delay:2s;
}

.petal:nth-child(2){
    top:30px;
    left:0;
    animation-delay:2.2s;
}

.petal:nth-child(3){
    top:30px;
    left:60px;
    animation-delay:2.4s;
}

.petal:nth-child(4){
    top:60px;
    left:30px;
    animation-delay:2.6s;
}

.center{
    width:40px;
    height:40px;
    background:gold;
    border-radius:50%;
    position:absolute;
    top:40px;
    left:40px;
    transform:scale(0);
    animation:bloom 1s 2.8s forwards;
}

/* Animaciones */
@keyframes growStem{
    from{height:0}
    to{height:160px}
}

@keyframes bloom{
    to{transform:scale(1)}
}

/* Mensaje */
.message{
    margin-top:40px;
    text-align:center;
    opacity:0;
    animation:showText 2s 4s forwards;
}

@keyframes showText{
    to{opacity:1}
}

/* Florecitas cayendo */
.falling{
    position:absolute;
    top:-10px;
    font-size:20px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<div class="flower">
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="center"></div>
</div>

<div class="stem"></div>

<div class="message">
<h2>Esta flor es para ti 🌸</h2>
<p>Porque admiro mucho lo mucho que te esfuerzas siempre.</p>
<p>Quería hacer algo diferente…</p>
<p>así que te programé una flor.</p>
</div>

<script>
function crearFlor(){
    const flor = document.createElement("div")
    flor.classList.add("falling")
    flor.innerHTML="🌸"

    flor.style.left=Math.random()*100+"vw"
    flor.style.animationDuration=(3+Math.random()*4)+"s"

    document.body.appendChild(flor)

    setTimeout(()=>{
        flor.remove()
    },7000)
}

setInterval(crearFlor,500)
</script>

</body>
</html>
